// ╔══════════════════════════════════════════════════════════════╗
// ║  PERSISTENCE — localStorage                                 ║
// ╚══════════════════════════════════════════════════════════════╝

function loadNotes() {
  try { return JSON.parse(localStorage.getItem("trilha-ia-notes")) || {} }
  catch(e) { return {} }
}

function saveAllNotes() {
  try {
    localStorage.setItem("trilha-ia-notes", JSON.stringify(notes));
    showSaved();
  } catch(e) {}
}

function showSaved() {
  const el = document.getElementById("saved-ind");
  el.style.opacity = "1";
  setTimeout(() => el.style.opacity = "0", 1200);
}

let notes = loadNotes();
let saveTimer = null;
function debounceSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveAllNotes, 800);
}

// ║  CALENDAR HELPERS                                            ║
// ╚══════════════════════════════════════════════════════════════╝

const CAL_START = new Date(2026, 3, 1); // April 1 2026

function weekDates(weekIdx) {
  const s = new Date(CAL_START);
  s.setDate(s.getDate() + weekIdx * 7);
  const e = new Date(s);
  e.setDate(e.getDate() + 6);
  const fmt = d => `${d.getDate()}/${d.getMonth() + 1}`;
  return {
    start: s, end: e,
    label: `${fmt(s)} – ${fmt(e)}`,
    month: s.toLocaleString("pt-BR", { month: "short" })
  };
}

let currentView = "timeline";
let selectedWeek = null;

function render() {
  const app = document.getElementById("app");

  if (currentView === "final") { app.innerHTML = renderFinal(); bindBack("timeline"); return }
  if (currentView === "deep")  { app.innerHTML = renderDeep();  bindBack("timeline"); return }
  if (currentView === "map")   { app.innerHTML = renderMap();   bindBack("timeline"); return }
  if (currentView === "cal")   { app.innerHTML = renderCal();   bindBack("timeline"); return }

  if (selectedWeek !== null) {
    app.innerHTML = renderWeekDetail(W[selectedWeek]);
    bindWeekEvents();
    return;
  }

  app.innerHTML = renderTimeline();
  bindTimelineEvents();
}

function noteCount() {
  return Object.values(notes).filter(v => v && v.trim()).length;
}

function wnc(id) {
  return [`w${id}-practice`, `w${id}-deliverable`, `w${id}-check0`, `w${id}-check1`, `w${id}-check2`]
    .filter(k => notes[k] && notes[k].trim()).length;
}

// ║  RENDER: WEEK DETAIL                                         ║

function renderWeekDetail(w) {
  const d = weekDates(w.id - 1);

  let h = `<div class="fade-in"><button class="back-btn" id="back-btn">← Voltar</button>`;

      <h2 style="font-size:24px;font-weight:800;color:#111827;margin:4px 0 8px">${w.title}</h2>

  // ── Schedule (day cards) ──

    <div style="background:#F9FAFB;border-radius:12px;padding:18px 20px;margin-bottom:24px;border:1px solid #E5E7EB">

  // ── Schedule (day cards) ──
  const dayCards = w.schedule.split("<br>").map(s => {
    const m = s.match(/^<strong>(.+?):<\/strong>\s*(.+)$/);
    return m ? { day: m[1].replace(/ manhã/g, ''), task: m[2] } : null;
  }).filter(Boolean);

  h += `
    <div style="margin-bottom:20px">
      <h3 style="font-size:12px;font-weight:700;color:#111827;margin:0 0 10px;text-transform:uppercase;letter-spacing:.5px">📅 Rotina desta semana</h3>
      <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px">`;

  dayCards.forEach(dc => {
    h += `
        <div style="flex:1;min-width:130px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:10px;padding:12px 14px">

          <div style="font-size:12px;color:#374151;line-height:1.5">${dc.task}</div>

  });

  h += `
      </div>
    </div>`;

  // ── Helper: render practice block ──
  function renderPractice() {
    return `
    <div class="section-box" style="background:#FFFBEB;border:1px solid #FDE68A;margin-top:24px;margin-bottom:16px">
      <h3 style="font-size:13px;font-weight:700;color:#92400E;margin:0 0 8px;text-transform:uppercase;letter-spacing:.5px">🔨 Atividade Prática Prévia</h3>

  // Week 1: practice before resources

  // ── Required Resources ──
  h += `<h3 style="font-size:14px;font-weight:700;color:#111827;margin:0 0 12px;text-transform:uppercase;letter-spacing:.5px">📌 Recursos</h3>`;

    h += `

        <!-- Badges row -->

        <div class="ri" style="background:#FFF7ED;border:1px solid #FED7AA">

  // ── Optional Resources ──
  if (w.opt.length) {
    w.opt.forEach(r => {

          <!-- Comentários Gabi -->
          <div class="ri" style="background:#F3F4F6;border:1px solid #D1D5DB">
            <strong style="color:#6B7280">Comentários Gabi:</strong> <span style="color:#9CA3AF;font-style:italic">Em breve</span>
          </div>

        </div>`;
    });
  }

  // ── Practice (skip week 1, already rendered above) ──
  if (w.id !== 1) { h += renderPractice(); }

  // ── Atividade Prática Posterior (Entregável + Checagem) ──
  h += `
    <div class="section-box" style="background:#FFFBEB;border:1px solid #FDE68A;margin-top:24px;margin-bottom:16px">
      <h3 style="font-size:13px;font-weight:700;color:#92400E;margin:0 0 14px;text-transform:uppercase;letter-spacing:.5px">🔨 Atividade Prática Posterior</h3>

      <!-- Entregável -->
      <div style="font-size:14px;color:#374151;line-height:1.6;margin-bottom:8px">${w.deliv}</div>

  w.checks.forEach((q, i) => {
    h += `
      <div style="margin-bottom:14px">
        <div style="font-size:14px;color:#374151;line-height:1.5;margin-bottom:6px">${q}</div>

  h += `</div>`;

  // ── Synthesis (if exists) ──
  if (w.synthesis) {
    const s = w.synthesis;
    h += `
      <div class="synth-box" style="border-color:${w.pc};background:linear-gradient(135deg,${w.pc}08,${w.pc}03)">

        <div style="margin-bottom:14px">

        </div>

  }

  h += `</div>`; // close fade-in wrapper
  return h;
}

  // Checklist

  return h;
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  EVENT BINDINGS                                              ║
// ╚══════════════════════════════════════════════════════════════╝

function bindBack(t) {
  document.getElementById("back-btn").addEventListener("click", () => {
    if (selectedWeek !== null) saveNotes(W[selectedWeek].id);
    selectedWeek = null;
    currentView = t;
    render();
    window.scrollTo(0, 0);
  });
}

function saveNotes(wid) {
  const p = document.getElementById("note-practice");
  const d = document.getElementById("note-deliv");
  if (p) notes["w" + wid + "-practice"] = p.value;
  if (d) notes["w" + wid + "-deliverable"] = d.value;
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById("note-check" + i);
    if (el) notes["w" + wid + "-check" + i] = el.value;
  }
  // Save resource notes (required + optional)
  document.querySelectorAll("textarea[id^='note-req-'], textarea[id^='note-opt-']").forEach(el => {
    const key = el.id.replace("note-", "w");
    notes[key] = el.value;
  });
  saveAllNotes();
}

function bindTimelineEvents() {
  document.querySelectorAll("[data-week]").forEach(el => {
    el.addEventListener("click", () => {
      selectedWeek = parseInt(el.dataset.week);
      render();
    });
    const card = el.querySelector(".week-card");
    const w = W[parseInt(el.dataset.week)];
    el.addEventListener("mouseenter", () => { if (card) card.style.borderColor = w.pc });
    el.addEventListener("mouseleave", () => { if (card) card.style.borderColor = "#E5E7EB" });
  });

  document.getElementById("final-btn").addEventListener("click", () => { currentView = "final"; render() });
  document.getElementById("deep-btn").addEventListener("click",  () => { currentView = "deep";  render() });
  document.getElementById("map-btn").addEventListener("click",   () => { currentView = "map";   render() });
}

function bindWeekEvents() {
  // Back button
  document.getElementById("back-btn").addEventListener("click", () => {
    if (selectedWeek !== null) saveNotes(W[selectedWeek].id);
    selectedWeek = null;
    render();
    window.scrollTo(0, 0);
  });

  const wid = W[selectedWeek].id;

  // Resource note textareas (Comentários Gabi — required + optional)
  document.querySelectorAll("textarea[id^='note-req-'], textarea[id^='note-opt-']").forEach(el => {
    el.addEventListener("input", () => {
      const key = el.id.replace("note-", "w");
      notes[key] = el.value;
      debounceSave();
    });
  });

  // Practice, deliverable, check textareas
  ["note-practice", "note-deliv", "note-check0", "note-check1", "note-check2"].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      const key = id === "note-practice" ? "w" + wid + "-practice"
                : id === "note-deliv"    ? "w" + wid + "-deliverable"
                : "w" + wid + "-check" + id.slice(-1);
      el.addEventListener("input", () => {
        notes[key] = el.value;
        debounceSave();
      });
    }
  });
}
